version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      lit:
        patterns:
          - "lit"
          - "lit-*"
          - "@lit/*"
          - "@lit-labs/*"
      rollup:
        patterns:
          - "rollup"
          - "@rollup/*"
          - "rollup-plugin-*"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "typescript-eslint"
          - "@typescript-eslint/*"
      testing:
        patterns:
          - "@web/*"
          - "@open-wc/*"
          - "@custom-elements-manifest/*"
          - "@types/mocha"
      # Catch-all so any remaining minor/patch bumps batch into one PR each
      # instead of spawning individual PRs and blowing past the 5-PR limit.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
